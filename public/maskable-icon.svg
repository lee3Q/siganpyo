<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Solid background for maskable icon (fills entire area) -->
  <rect width="100" height="100" rx="0" fill="#2563eb"/>
  <!-- Clock icon centered in safe zone (80% = 10-90 range, center at 50) -->
  <g fill="none" stroke="white" stroke-width="4" stroke-linecap="round">
    <circle cx="50" cy="52" r="24"/>
    <line x1="50" y1="52" x2="50" y2="36"/>
    <line x1="50" y1="52" x2="62" y2="52"/>
  </g>
  <rect x="46" y="22" width="8" height="5" rx="1" fill="white"/>
</svg>
